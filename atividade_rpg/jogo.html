<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <!--Tela centra do jogo-->
            <div class="card">
                <!-- Cabeçalho do RPG -->
                <div class="card-header text-center">
                    Gatinhos em apuros - Criado por Julia
                </div>
                <!-- Tela central do jogo -->
                <div class="card-body">
                    <div class="row">
                        <!-- Status do Herói -->
                        <div class="col">
                            <ul class="list-group float-end text-center" style="width: 225px">
                                <li class="list-group-item">Brutos Corajoso 😼</li>
                                <li class="list-group-item">Herói</li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress value="100" max="100" style="accent-color: rgb(255, 24, 24);"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress value="100" max="100" style="accent-color: rgb(74, 255, 74);"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress value="40" max="100" style="accent-color: rgb(255, 194, 81);"></progress>
                                </li>
                            </ul>
                        </div>
                        <!-- Status do Chefe -->
                        <div class="col">
                            <ul class="list-group float-start text-center" style="width: 225px">
                                <li class="list-group-item">Zorg Malvado 😾</li>
                                <li class="list-group-item">Chefão</li>
                                <li class="list-group-item">
                                    💜
                                    <progress value="100" max="100" style="accent-color: rgb(55, 0, 255);"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress value="50" max="100" style="accent-color: rgb(255, 0, 255);"></progress>
                                </li>
                            </ul>
                        </div> <!-- fim do row--> 
                        <div class="row">
                            <!--IMG HERO-->
                            <div class="col"></div>
                            <!--IMG BOSS-->
                            <div class="col"></div>
                        </div>
                    </div>
                </div>
                <div class="card-footer"></div>
            </div> <!-- fechamento do card>-->
        </div> <!-- fechamento do conteiner-->
    </body>
</html>
